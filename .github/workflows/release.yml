name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: gradle/actions/wrapper-validation@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'microsoft'

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION"

      - name: Update version in gradle.properties
        run: |
          sed -i "s/^mod_version=.*/mod_version=${{ steps.version.outputs.version }}/" gradle.properties
          cat gradle.properties | grep mod_version

      - name: Commit version update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: bump version to ${{ steps.version.outputs.version }}"
          file_pattern: gradle.properties
          branch: main

      - run: chmod +x ./gradlew

      - run: ./gradlew build

      - uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          generate_release_notes: true

      - uses: Kira-NT/mc-publish@v3
        with:
          modrinth-id: 1of6iwqZ
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files-primary: build/libs/mirage-${{ steps.version.outputs.version }}.jar
          files-secondary: build/libs/mirage-${{ steps.version.outputs.version }}-sources.jar
          version: ${{ github.ref_name }}
          version-type: release
          game-versions: 1.21.11
          loaders: fabric
